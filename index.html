<!-- وصف للمشاركة -->
<meta name="description" content="الروابط الاجتماعية لمنصة NGF - تابعني على يوتيوب، تويتش، تويتر، إنستغرام">



    <style>
        :root {
            --primary: #0a0a0a;
            --secondary: #1a1a2e;
            --accent: #7aa2f7;
            --text: #a9b1d6;
            --text-light: #c0caf5;
            --youtube: #ff0000;
            --twitch: #9147ff;
            --twitter: #1da1f2;
            --instagram: #e1306c;
            --card-bg: rgba(10, 10, 20, 0.75);
            --transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(ellipse at center, #0a0a0a, #0a0a2a);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية متحركة خلف الجسم */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 80%, rgba(122, 162, 247, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 0, 0, 0.03) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* تأثير حدود متحركة للكونتينر */
        .container::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--youtube), var(--twitch), var(--twitter), var(--instagram), var(--youtube));
            border-radius: 34px;
            z-index: -2;
            opacity: 0;
            transition: opacity 0.5s;
            filter: blur(15px);
        }

        .container:hover::after {
            opacity: 0.3;
            animation: borderGlow 3s linear infinite;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            position: relative;
        }

        .avatar {
            width: 110px;
            height: 110px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #2ac3de);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(122, 162, 247, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.2);
            transition: var(--transition);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .avatar:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 40px rgba(122, 162, 247, 0.5);
            animation: none;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        h1 {
            font-size: 1.9rem;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, var(--accent), #7dc4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .bio {
            font-size: 0.95rem;
            color: var(--text);
            opacity: 0.8;
            max-width: 85%;
            margin: 0 auto;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 32px 0;
        }

        .link-card {
            background: rgba(20, 22, 36, 0.6);
            padding: 14px 18px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
        }

        /* تأثير RGB متحرك عند التمرير */
        .link-card:hover {
            transform: translateY(-5px) scale(1.02);
            background: rgba(30, 32, 50, 0.9);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* شريط جانبي من اليمين (للعربي) */
        .link-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
            background: var(--link-color);
            transition: var(--transition);
            border-radius: 0 4px 4px 0;
        }

        .link-card:hover::before {
            width: 6px;
            box-shadow: 0 0 12px var(--link-color);
        }

        /* تأثير توهج RGB عند التمرير */
        .link-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.5s;
            pointer-events: none;
        }

        .link-card:hover::after {
            left: 100%;
        }

        .link-icon {
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: white;
            font-size: 1.3rem;
            transition: var(--transition);
        }

        .link-card:hover .link-icon {
            transform: scale(1.15) rotate(5deg);
            background: var(--link-color);
            box-shadow: 0 0 20px var(--link-color);
        }

        .link-content {
            flex: 1;
            text-align: right;
        }

        .link-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .link-desc {
            font-size: 0.8rem;
            opacity: 0.7;
            font-family: monospace;
            letter-spacing: 0.5px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .social-link {
            width: 46px;
            height: 46px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.06);
            color: var(--text);
            font-size: 1.3rem;
            transition: var(--transition);
            text-decoration: none;
        }

        .social-link:hover {
            transform: translateY(-5px) scale(1.1);
            color: white;
            background: var(--link-color);
            box-shadow: 0 8px 20px var(--link-shadow);
        }

        /* تحسينات للجوال */
        @media (max-width: 480px) {
            .container {
                padding: 24px;
                border-radius: 28px;
            }
            
            .avatar {
                width: 95px;
                height: 95px;
            }
            
            h1 {
                font-size: 1.6rem;
            }
            
            .link-card {
                padding: 12px 16px;
            }
            
            .link-icon {
                width: 42px;
                height: 42px;
                font-size: 1.1rem;
            }
        }

        /* تأثير ظهور تدريجي للعناصر */
        .link-card {
            animation: slideIn 0.4s ease-out backwards;
        }

        .link-card:nth-child(1) { animation-delay: 0.1s; }
        .link-card:nth-child(2) { animation-delay: 0.2s; }
        .link-card:nth-child(3) { animation-delay: 0.3s; }
        .link-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
</head>
<body>

    <script>
    // تسجيل Service Worker
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js')
                .then(registration => {
                    console.log('✅ Service Worker registered successfully:', registration.scope);
                    
                    // التحقق من التحديثات
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        console.log('🔄 New Service Worker found, updating...');
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('📢 New content available, refresh to update.');
                                // عرض إشعار للمستخدم بتوفر تحديث
                                showUpdateNotification();
                            }
                        });
                    });
                })
                .catch(error => {
                    console.error('❌ Service Worker registration failed:', error);
                });
        });
    }
    
    // إشعار بتوفر تحديث
    function showUpdateNotification() {
        const toast = document.createElement('div');
        toast.innerHTML = `
            <div style="
                position: fixed;
                bottom: 20px;
                left: 20px;
                right: 20px;
                background: rgba(0,0,0,0.9);
                backdrop-filter: blur(16px);
                border-radius: 1rem;
                padding: 1rem;
                display: flex;
                align-items: center;
                justify-content: space-between;
                z-index: 10000;
                border: 1px solid rgba(255,255,255,0.1);
                direction: rtl;
            ">
                <span style="color: white;">🔄 تحديث جديد متاح</span>
                <button onclick="location.reload()" style="
                    background: linear-gradient(135deg, #00d4ff, #a855f7);
                    border: none;
                    padding: 0.5rem 1rem;
                    border-radius: 2rem;
                    color: white;
                    cursor: pointer;
                    font-family: inherit;
                ">تحديث الآن</button>
            </div>
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 10000);
    }
    
    // التحقق من وضع عدم الاتصال
    window.addEventListener('online', () => {
        console.log('📶 Back online');
        const toast = document.createElement('div');
        toast.innerHTML = `<div style="
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            z-index: 10000;
            font-size: 0.85rem;
        ">✅ تم استعادة الاتصال بالإنترنت</div>`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    });
    
    window.addEventListener('offline', () => {
        console.log('📴 Offline');
    });
</script>

   
    <script>
// أداة سريعة لإنشاء أيقونات (اختياري)
function generateIcon(size, bgColor, text) {
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, size, size);
    ctx.fillStyle = 'white';
    ctx.font = `bold ${size * 0.4}px Tajawal`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, size/2, size/2);
    return canvas.toDataURL();
}
// استخدمها لتوليد الأيقونات مؤقتاً
</script>


 <script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(registration => {
                    console.log('✅ Service Worker registered:', registration.scope);
                })
                .catch(error => {
                    console.log('❌ Registration failed:', error);
                });
        });
    }


    
    // التحقق من إمكانية تثبيت التطبيق
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        showInstallButton(); // عرض زر التثبيت للمستخدم
    });
    
    function showInstallButton() {
        const installBtn = document.createElement('button');
        installBtn.innerHTML = '📲 تثبيت التطبيق';
        installBtn.style.cssText = `
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: linear-gradient(135deg, #00d4ff, #a855f7);
            border: none;
            padding: 12px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            z-index: 9999;
            font-family: 'Tajawal', sans-serif;
        `;
        installBtn.onclick = async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') console.log('✅ تم تثبيت التطبيق');
                deferredPrompt = null;
                installBtn.remove();
            }
        };
        document.body.appendChild(installBtn);
    }
</script>
