
<!DOCTYPE html>
<html>
<head>
    <title>صنع الأيقونات</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #7aa2f7; color: white; border: none; border-radius: 10px; }
        #status { margin-top: 20px; color: green; }
    </style>
</head>
<body>
    <h2>🖼️ إنشاء جميع أيقونات PWA</h2>
    <button onclick="generateAllIcons()">ابدأ التحميل</button>
    <div id="status"></div>

    <script>
        async function generateAllIcons() {
            const sizes = [72, 96, 128, 144, 152, 192, 384, 512];
            const statusDiv = document.getElementById('status');
            
            // استخدام الصورة الموجودة كمصدر
            const img = new Image();
            img.crossOrigin = "Anonymous";
            
            // انتظر تحميل الصورة
            img.onload = function() {
                sizes.forEach(size => {
                    const canvas = document.createElement('canvas');
                    canvas.width = size;
                    canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    
                    // رسم الصورة مصغرة
                    ctx.drawImage(img, 0, 0, img.width, img.height, 0, 0, size, size);
                    
                    // تحميل الصورة
                    const link = document.createElement('a');
                    link.download = `icon-${size}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
                statusDiv.innerHTML = '✅ تم التحميل! راح تلاقي الصور في مجلد التحميلات';
            };
            
            img.onerror = function() {
                statusDiv.innerHTML = '❌ فشل تحميل الصورة - تأكد من اسم الملف';
            };
            
            // استخدم الصورة اللي عندك
            img.src = 'icons/NGF LOGO Update 2.00V.png';
        }
    </script>
</body>
</html>
